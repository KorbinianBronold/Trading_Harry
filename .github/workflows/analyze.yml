name: analyze
on:
  schedule:
    - cron: '0 13 * * 1-5'    # pre_market     15:00 Berlin
    - cron: '0 14 * * 1-5'    # evaluate       16:00 Berlin
    - cron: '0 17 * * 1-5'   # midday         19:00 Berlin
    - cron: '30 15 * * 1-5'   # position_check 17:30 Berlin
    - cron: '30 20 * * 1-5'   # close          22:30 Berlin
    - cron: '0 18 * * 0'      # weekly         20:00 Berlin Sonntag

  workflow_dispatch:
    inputs:
      run_type:
        type: choice
        options: [pre_market, midday, close, evaluate, weekly, position_check]
        default: close

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
      SENDGRID_API_KEY:       ${{ secrets.SENDGRID_API_KEY }}
      EMAIL_TO:               ${{ secrets.EMAIL_TO }}
      EMAIL_FROM:             ${{ secrets.EMAIL_FROM }}
      FINNHUB_API_KEY:        ${{ secrets.FINNHUB_API_KEY }}
      CAPITAL_COM_API_KEY:    ${{ secrets.CAPITAL_COM_API_KEY }}
      CAPITAL_COM_IDENTIFIER: ${{ secrets.CAPITAL_COM_IDENTIFIER }}
      CAPITAL_COM_PASSWORD:   ${{ secrets.CAPITAL_COM_PASSWORD }}
      GH_TOKEN:               ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data dir
        run: mkdir -p data

      - name: Download tracking.db from Release db-latest (best effort)
        run: |
          gh release download db-latest --pattern "tracking.db" \
            --dir data/ || echo "No prior db-latest release — fresh start."

      - name: Determine run_type
        id: rt
        run: |
          if [ -n "${{ inputs.run_type }}" ]; then
            echo "type=${{ inputs.run_type }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ="Europe/Berlin" date +%H)
          MIN=$(TZ="Europe/Berlin" date +%M)
          DOW=$(TZ="Europe/Berlin" date +%u)

          if   [ "$DOW" = "7" ] && [ "$HOUR" = "20" ]; then    T="weekly"
          elif [ "$HOUR" = "14" ] && [ "$MIN" -lt "30" ]; then  T="pre_market"
          elif [ "$HOUR" = "15" ] && [ "$MIN" -lt "30" ]; then  T="evaluate"
          elif [ "$HOUR" = "16" ] && [ "$MIN" -ge "10" ]; then  T="midday"
          elif [ "$HOUR" = "17" ] && [ "$MIN" -ge "25" ]; then  T="position_check"
          elif [ "$HOUR" = "22" ] || [ "$HOUR" = "23" ]; then   T="close"
          else                                                    T="close"
          fi
          echo "type=$T" >> "$GITHUB_OUTPUT"

      - name: Run analysis
        run: python main.py --run-type ${{ steps.rt.outputs.type }}

      - name: Upload tracking.db to Release db-latest
        if: success()
        run: |
          gh release view db-latest >/dev/null 2>&1 \
            || gh release create db-latest --title "DB latest" \
                 --notes "Auto-uploaded by analyze.yml"
          gh release upload db-latest data/tracking.db --clobber

      - name: Weekly DB snapshot (Sunday only)
        if: success() && steps.rt.outputs.type == 'weekly'
        run: |
          WEEK=$(date -u +%G-W%V)
          gh release create "db-$WEEK" data/tracking.db \
            --title "DB snapshot $WEEK" \
            --notes "Weekly snapshot generated by analyze.yml" \
            || echo "Snapshot already exists for $WEEK"